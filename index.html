<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jason Carlson — AI Research Engineer</title>
    <meta
      name="description"
      content="Jason Carlson — AI research engineer working on personalized policies (LLM fine-tuning + RL) and exploration for robotics. Based in New York."
    />
    <link rel="canonical" href="https://jasoncarlson.org/" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Jason Carlson — AI Research Engineer" />
    <meta
      property="og:description"
      content="Human-aligned policy learning, reinforcement learning, and clinical ML."
    />
    <meta property="og:url" content="https://jasoncarlson.org/" />
    <meta name="twitter:card" content="summary" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b0d" media="(prefers-color-scheme: dark)" />

    <!-- Fonts: Inter (body/headings) + JetBrains Mono (metadata labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Set theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
